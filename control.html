<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><title>自動控制</title></head>
<body>
<h2>自動控制中...</h2>
<p id="log"></p>
<script>
const VPS = "https://server-8dhv.onrender.com";
const CLAUDE_KEY = "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";
const history = [];

async function askClaude() {
  history.push({"role":"user","content":"現在決定下一個玩具指令。只能回覆其中一個：set 1 1、set 2 2、set 3 3、set 4 4、set 5 5、stop、wait。不要說其他任何話。"});
  const res = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: {
      "x-api-key": CLAUDE_KEY,
      "anthropic-version": "2023-06-01",
      "content-type": "application/json",
      "anthropic-dangerous-direct-browser-access": "true"
    },
    body: JSON.stringify({
      model: "claude-sonnet-4-6",
      max_tokens: 20,
      system: "你是玩具遠端控制AI，負責控制用戶的玩具。根據對話節奏決定指令。只能回覆：set 1 1、set 2 2、set 3 3、set 4 4、set 5 5、stop、wait。",
      messages: history
    })
  });
  const data = await res.json();
  const reply = data.content[0].text.trim();
  history.push({"role":"assistant","content":reply});
  return reply;
}

async function sendToVPS(reply) {
  if (reply === "wait") return;
  const parts = reply.split(" ");
  let body;
  if (parts[0] === "stop") {
    body = {cmd:"stop",mode:0,intensity:0};
  } else {
    body = {cmd:"set",mode:parseInt(parts[1]),intensity:parseInt(parts[2])};
  }
  await fetch(VPS+"/set", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify(body)
  });
}

async function loop() {
  const log = document.getElementById("log");
  while(true) {
    try {
      const cmd = await askClaude();
      log.innerText = "指令：" + cmd + "\n" + log.innerText;
      await sendToVPS(cmd);
    } catch(e) {
      log.innerText = "錯誤：" + e + "\n" + log.innerText;
    }
    await new Promise(r => setTimeout(r, 8000));
  }
}

loop();
</script>
</body>
</html>
